name: Publish to PyPI

on:
  push:
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  test:
    name: Test build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Create venv
        run: uv venv .venv

      # Installs your project editable + dev group deps (from [dependency-groups].dev)
      - name: Install dev deps
        run: uv sync --python .venv/bin/python --group dev

      # Build extension into the venv so tests import the native module
      - name: Build with maturin (develop)
        run: uv run --python .venv/bin/python maturin develop --release

      - name: Run Python tests
        run: uv run --python .venv/bin/python pytest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        run: cargo test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build wheels
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native wheels
          - os: ubuntu-latest
            maturin_args: "--release --sdist --out dist"
            manylinux: "2_28"

          - os: macos-latest
            maturin_args: "--release --out dist --target universal2-apple-darwin"

          - os: windows-latest
            maturin_args: "--release --out dist"

          # Linux cross-arch wheels
          - os: ubuntu-latest
            maturin_args: "--release --out dist --target aarch64-unknown-linux-gnu"
            manylinux: "2_28"

          - os: ubuntu-latest
            maturin_args: "--release --out dist --target armv7-unknown-linux-gnueabihf"
            manylinux: "2_28"

    steps:
      - uses: actions/checkout@v6

      # Keep Python simple here; maturin-action brings its own Python(s) for builds.
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Build wheels with maturin
        uses: PyO3/maturin-action@v1.51.0
        with:
          command: build
          args: ${{ matrix.maturin_args }}
          manylinux: ${{ matrix.manylinux }}

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ runner.os }}-${{ matrix.maturin_args }}
          path: dist/*

  build_pyodide:
    name: Build Pyodide wheels
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: pyodide-2025
            python_version: "3.13"
            xbuildenv_channel: "nightly"
            xbuildenv_version: "20260401"
            emscripten_version: "4.0.9"
            wheel_glob: "fastquadtree-*-cp39-abi3-pyemscripten_2025_0_wasm32.whl"
          - label: pyodide-2026
            python_version: "3.14"
            xbuildenv_channel: "stable"
            xbuildenv_version: "314.0.0"
            emscripten_version: "5.0.3"
            wheel_glob: "fastquadtree-*-cp39-abi3-pyemscripten_2026_0_wasm32.whl"
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Cache Pyodide cross-build environment
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastquadtree-${{ matrix.label }}
          key: pyodide-xbuildenv-${{ runner.os }}-${{ matrix.label }}-${{ matrix.xbuildenv_version }}-${{ matrix.emscripten_version }}-rust-1.93.0

      - name: Build Pyodide wheel
        env:
          PYODIDE_HOST_PYTHON: ${{ matrix.python_version }}
          PYODIDE_XBUILDENV_ROOT: ~/.cache/fastquadtree-${{ matrix.label }}
          PYODIDE_XBUILDENV_CHANNEL: ${{ matrix.xbuildenv_channel }}
          PYODIDE_XBUILDENV_VERSION: ${{ matrix.xbuildenv_version }}
          PYODIDE_EMSCRIPTEN_VERSION: ${{ matrix.emscripten_version }}
          RUST_TOOLCHAIN: "1.93.0"
          UV_CACHE_DIR: ~/.cache/uv
          PYODIDE_EXPECTED_WHEEL_GLOB: ${{ matrix.wheel_glob }}
        run: bash scripts/build_pyodide_wheel.sh

      - name: Upload Pyodide dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.label }}
          path: dist/${{ matrix.wheel_glob }}

  publish:
    name: Publish distributions to PyPI
    needs: [build, build_pyodide]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for Trusted Publisher (recommended)
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Download all dist artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      # Option A (recommended): PyPI Trusted Publisher (OIDC), no token needed.
      # - name: Publish (Trusted Publisher)
      #   run: uv publish dist/*

      # Option B: Token-based publish.
      - name: Publish (Token)
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish dist/*
